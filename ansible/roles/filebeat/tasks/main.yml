- name: Install Docker
  become: true
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Ensure Docker is running
  become: true
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create filebeat config dir
  become: true
  ansible.builtin.file:
    path: /etc/filebeat
    state: directory
    mode: "0755"

- name: Deploy filebeat config
  become: true
  ansible.builtin.template:
    src: filebeat.yml.j2
    dest: /etc/filebeat/filebeat.yml
    mode: "0644"
  notify: restart filebeat

- name: Pull Filebeat image via first reachable mirror
  become: true
  ansible.builtin.shell: |
    IMG="elastic/filebeat:8.15.0"
    for M in cr.yandex/mirror dockerhub.timeweb.cloud dh-mirror.gitverse.ru huecker.io; do
      for REF in "$M/$IMG" "$M/library/$IMG"; do
        echo "Trying $REF"
        if docker pull "$REF"; then
          docker tag "$REF" "$IMG"
          echo "PULLED_FROM=$REF"
          exit 0
        fi
      done
    done
    echo "ALL_MIRRORS_FAILED" >&2
    exit 1
  args:
    executable: /bin/bash
  register: fb_pull
  changed_when: "'PULLED_FROM' in fb_pull.stdout"

- name: Run Filebeat container
  become: true
  ansible.builtin.shell: |
    if [ -z "$(docker ps -aq -f name=^filebeat$)" ]; then
      docker run -d --name filebeat \
        --user root \
        -v /etc/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro \
        -v /var/log/nginx:/var/log/nginx:ro \
        -v filebeat-data:/usr/share/filebeat/data \
        --restart unless-stopped \
        elastic/filebeat:8.15.0
      echo CREATED
    else
      docker start filebeat >/dev/null
      echo STARTED
    fi
  args:
    executable: /bin/bash
  register: fb_run
  changed_when: "'CREATED' in fb_run.stdout"
