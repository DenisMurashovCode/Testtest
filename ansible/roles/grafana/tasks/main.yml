- name: Install Docker
  become: true
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Ensure Docker is running and enabled
  become: true
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Pull Grafana image via first reachable mirror
  become: true
  ansible.builtin.shell: |
    for M in cr.yandex/mirror dockerhub.timeweb.cloud dh-mirror.gitverse.ru huecker.io; do
      echo "Trying mirror: $M"
      if docker pull "$M/grafana/grafana:latest"; then
        docker tag "$M/grafana/grafana:latest" grafana/grafana:latest
        echo "PULLED_FROM=$M"
        exit 0
      fi
    done
    echo "ALL_MIRRORS_FAILED" >&2
    exit 1
  args:
    executable: /bin/bash
  register: grafana_pull
  changed_when: "'PULLED_FROM' in grafana_pull.stdout"

- name: Run Grafana container
  become: true
  ansible.builtin.shell: |
    if [ -z "$(docker ps -aq -f name=^grafana$)" ]; then
      docker run -d --name grafana \
        -p 3000:3000 \
        -v grafana-storage:/var/lib/grafana \
        --restart unless-stopped \
        grafana/grafana:latest
      echo CREATED
    else
      docker start grafana >/dev/null
      echo STARTED
    fi
  args:
    executable: /bin/bash
  register: grafana_run
  changed_when: "'CREATED' in grafana_run.stdout"
